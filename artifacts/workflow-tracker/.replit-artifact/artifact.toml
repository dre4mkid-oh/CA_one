kind = "web"
previewPath = "/"
title = "WorkFlow — Work Time Tracker"
version = "1.0.0"
id = "artifacts/workflow-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21032

[services.development]
run = "pnpm --filter @workspace/workflow-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/workflow-tracker", "run", "build" ]
publicDir = "artifacts/workflow-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21032"
BASE_PATH = "/"
